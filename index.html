<!DOCTYPE html>
<html lang="he">

  <head>
      <meta charset="utf-8" />
      <meta name="viewport" content="width=device-width,initial-scale=1" />
      <title>try</title>
      <link rel="stylesheet" href="https://pyscript.net/latest/pyscript.css" />
      <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
      <script src="js/easy-number-separator.js"></script>
  </head>

  <body>
      <h1>wzup?</h1>
      <p>not much</p>


      <!-- define inputs -->
      <form>
          <fieldset>
              <legend>select amortizations</legend>
                  <details>
                      <summary>info</summary>
                      <p>Detailed content goes here …</p>
                  </details>

                  <div aria-required="true">
                      <input type="checkbox" id="shpitzer" name="amortizations" value="shpitzer" checked
                             onchange="if(shpitzer.checked == false && equal.checked == false){shpitzer.checked = true;}"
                             onkeypress="if(shpitzer.checked == false && equal.checked == false){shpitzer.checked = true;}"
                      />
                      <label for="shpitzer">include shpitzer&nbsp;&nbsp;</label>

                      <input type="checkbox" id="equal" name="amortizations" value="equal"
                             onchange="if(shpitzer.checked == false && equal.checked == false){shpitzer.checked = true;}"
                             onkeypress="if(shpitzer.checked == false && equal.checked == false){shpitzer.checked = true;}"
                      />
                      <label for="equal">include equal</label>
                  </div>
          </fieldset><br>

          <fieldset>
              <legend>select prime portion</legend>
                  <details>
                      <summary>info</summary>
                      <p>Detailed content goes here …</p>
                  </details>

                  <div>
                      <input type="radio" id="33" name="prime" value="1" checked/>
                      <label for="33">33%&nbsp;&nbsp;</label>

                      <input type="radio" id="66" name="prime" value="2"/>
                      <label for="66">66%&nbsp;&nbsp;</label>

                      <input type="radio" id="opt" name="prime" value="0"/>
                      <label for="opt">optimized</label>
                  </div>
          </fieldset><br>

          <fieldset>
              <legend>personal details</legend>
                  <details>
                      <summary>info</summary>
                      <p>Detailed content goes here …</p>
                  </details>

                  <div>
                      <input type="checkbox" id="is_married_couple" name="is_married_couple" value="1"/>
                      <label for="is_married_couple">married couple</label><br>

                      <input type="checkbox" id="is_single_asset" name="is_single_asset" value="1" checked
                             onchange="if(is_single_asset.checked == true && capital.value < asset_cost.value * 0.25){capital.value = parseInt(asset_cost.value * 0.25);}else if(is_single_asset.checked == false && capital.value < asset_cost.value * 0.5){capital.value = parseInt(asset_cost.value * 0.5);}"
                             onkeypress="if(is_single_asset.checked == true && capital.value < asset_cost.value * 0.25){capital.value = parseInt(asset_cost.value * 0.25);}else if(is_single_asset.checked == false && capital.value < asset_cost.value * 0.5){capital.value = parseInt(asset_cost.value * 0.5);}"
                      />
                      <label for="is_single_asset">single asset</label><br>
                  </div><br>

                  <div>
                      <label for="asset_cost">asset cost&nbsp;&nbsp;</label>
                      <input type="number" id="asset_cost" name="asset_cost" value="100000" min="100000" max="10000000" step="1000"
                             onchange="if(asset_cost.value == ''){asset_cost.value = 100000;}"
                             onkeypress="if(asset_cost.value == ''){asset_cost.value = 100000;}"
                      /><br><br>

                      <label for="capital">capital&nbsp;&nbsp;</label>
                      <input type="number" id="capital" name="capital" step="1000" value="25000" min="25000" max="10000000"
                             onchange="if(is_single_asset.checked == true && capital.value < asset_cost.value * 0.25){capital.value = parseInt(asset_cost.value * 0.25);}else if(is_single_asset.checked == false && capital.value < asset_cost.value * 0.5){capital.value = parseInt(asset_cost.value * 0.5);}"
                             onkeypress="if(is_single_asset.checked == true && capital.value < asset_cost.value * 0.25){capital.value = parseInt(asset_cost.value * 0.25);}else if(is_single_asset.checked == false && capital.value < asset_cost.value * 0.5){capital.value = parseInt(asset_cost.value * 0.5);}"
                      /><br><br>

                      <label for="net_monthly_income">net monthly income&nbsp;&nbsp;</label>
                      <input type="number" id="net_monthly_income" name="net_monthly_income" step="100" value="3000" min="3000" max="100000"
                             onchange="if(net_monthly_income.value < 1.3 * 3 * (asset_cost.value - capital.value) / (12 * 30)){net_monthly_income.value = parseInt(1.3 * (asset_cost.value - capital.value) / (12 * 30));}"
                             onkeypress="if(net_monthly_income.value < 1.3 * 3 * (asset_cost.value - capital.value) / (12 * 30)){net_monthly_income.value = parseInt(1.3 * (asset_cost.value - capital.value) / (12 * 30));}"
                      /><br><br>

                      <label for="max_monthly_payment">max monthly payment&nbsp;&nbsp;</label>
                      <input type="number" id="max_monthly_payment" name="max_monthly_payment" step="1000" value="1000" min="1000" max="100000"
                             onchange="if(max_monthly_payment.value > net_monthly_income.value / 3){max_monthly_payment.value = parseInt(net_monthly_income.value / 3);}else if(max_monthly_payment.value < 1.3 * 3 * (asset_cost.value - capital.value) / (12 * 30)){max_monthly_payment.value = parseInt(1.3 * 3 * (asset_cost.value - capital.value) / (12 * 30));}"
                             onkeypress="if(max_monthly_payment.value > net_monthly_income.value / 3){max_monthly_payment.value = parseInt(net_monthly_income.value / 3);}else if(max_monthly_payment.value < 1.3 * 3 * (asset_cost.value - capital.value) / (12 * 30)){max_monthly_payment.value = parseInt(1.3 * 3 * (asset_cost.value - capital.value) / (12 * 30));}"
                      /><br><br>

                  </div>

          </fieldset><br>

          <input type="reset">

      </form><br>


      <!-- action -->
      <button py-click="func">calculate</button><br><br>
<!--      <div id="output"></div>-->
      <script type="py" src="./main.py" config="./pyscript.json"></script>

  </body>

</html>
